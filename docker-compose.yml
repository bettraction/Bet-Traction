version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bettraction-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bettraction
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bettraction-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bettraction-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bettraction-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: bettraction-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bettraction
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bettraction-network

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: bettraction-web
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - bettraction-network

  admin:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.admin
    container_name: bettraction-admin
    ports:
      - "5174:80"
    depends_on:
      - api
    networks:
      - bettraction-network

  nginx:
    image: nginx:alpine
    container_name: bettraction-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
      - admin
    networks:
      - bettraction-network

  prometheus:
    image: prom/prometheus:latest
    container_name: bettraction-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - bettraction-network

  grafana:
    image: grafana/grafana:latest
    container_name: bettraction-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - bettraction-network

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  bettraction-network:
    driver: bridge
