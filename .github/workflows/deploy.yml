name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    needs: [build, test, security]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Images
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/bettraction-api:${{ github.sha }} -f infrastructure/docker/Dockerfile.api .
          docker build -t ${{ steps.login-ecr.outputs.registry }}/bettraction-web:${{ github.sha }} -f infrastructure/docker/Dockerfile.web .
          docker build -t ${{ steps.login-ecr.outputs.registry }}/bettraction-admin:${{ github.sha }} -f infrastructure/docker/Dockerfile.admin .
          docker push ${{ steps.login-ecr.outputs.registry }}/bettraction-api:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/bettraction-web:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/bettraction-admin:${{ github.sha }}

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster bettraction-cluster --service bettraction-api --force-new-deployment
          aws ecs update-service --cluster bettraction-cluster --service bettraction-web --force-new-deployment
          aws ecs update-service --cluster bettraction-cluster --service bettraction-admin --force-new-deployment
